<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#15151c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.6">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#26262e" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Status pill -->
  <g transform="translate(80, 88)">
    <rect x="0" y="0" width="280" height="36" rx="18" fill="#00ff88" fill-opacity="0.08" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="22" cy="18" r="4" fill="#00ff88"/>
    <text x="38" y="23" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="500" fill="#00ff88" letter-spacing="0.5">
      58 TOOLS · 100% FREE · NO LOGIN
    </text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(80, 162)">
    <text font-family="Syne, system-ui, sans-serif" font-size="74" font-weight="700" letter-spacing="-2">
      <tspan fill="#ededed">debug</tspan>
      <tspan fill="#00ff88">&lt;daily&gt;</tspan>
    </text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 286)">
    <text font-family="Syne, system-ui, sans-serif" font-size="56" font-weight="600" fill="#ededed" letter-spacing="-1.4">
      <tspan x="0" dy="0">Every tool a developer</tspan>
      <tspan x="0" dy="68">actually needs<tspan fill="#00ff88">.</tspan> Daily<tspan fill="#00ff88">.</tspan></tspan>
    </text>
  </g>

  <!-- Tool list strip -->
  <g transform="translate(80, 470)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#9a9aa5" letter-spacing="0.3">
      <tspan x="0" dy="0">JSON · JWT · Regex · DNS · SSL · Base64 · UUID · Hash · Cron · QR · cURL</tspan>
      <tspan x="0" dy="32">YAML · SQL · Bcrypt · Nginx · Dockerfile · CIDR · WHOIS · IP · Timezone</tspan>
    </text>
  </g>

  <!-- Domain footer -->
  <g transform="translate(80, 562)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" font-weight="600" fill="#00ff88">
      &gt;_ debugdaily.online
    </text>
  </g>

  <!-- Right side decorative terminal block -->
  <g transform="translate(720, 110)" opacity="0.85">
    <rect width="400" height="380" rx="12" fill="#0f0f15" stroke="#26262e" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="400" height="34" rx="12" fill="#15151c"/>
    <rect width="400" height="22" y="12" fill="#15151c"/>
    <circle cx="22" cy="17" r="5" fill="#ff5e5e" fill-opacity="0.7"/>
    <circle cx="42" cy="17" r="5" fill="#f5a623" fill-opacity="0.7"/>
    <circle cx="62" cy="17" r="5" fill="#00ff88" fill-opacity="0.7"/>
    <text x="100" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#6f6f7a" letter-spacing="1">~/DEBUGDAILY</text>

    <!-- Terminal body -->
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="14">
      <text x="20" y="78" fill="#00ff88">$</text>
      <text x="40" y="78" fill="#ededed">debugdaily decode jwt</text>
      <text x="20" y="106" fill="#9a9aa5">  ↳ alg: HS256 · exp: 14m</text>

      <text x="20" y="146" fill="#00ff88">$</text>
      <text x="40" y="146" fill="#ededed">debugdaily check ssl</text>
      <text x="20" y="174" fill="#9a9aa5">  ↳ valid · 87 days left</text>

      <text x="20" y="214" fill="#00ff88">$</text>
      <text x="40" y="214" fill="#ededed">debugdaily resolve dns</text>
      <text x="20" y="242" fill="#9a9aa5">  ↳ A · 76.76.21.21</text>

      <text x="20" y="282" fill="#00ff88">$</text>
      <text x="40" y="282" fill="#ededed">debugdaily format json</text>
      <text x="20" y="310" fill="#9a9aa5">  ↳ 2.3 KB · valid</text>

      <text x="20" y="350" fill="#00ff88">$</text>
      <rect x="40" y="338" width="10" height="18" fill="#00ff88"/>
    </g>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="400" height="4" fill="#00ff88"/>
</svg>
